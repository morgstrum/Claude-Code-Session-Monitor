<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2e2c33"/>
      <stop offset="1" stop-color="#141317"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d97a4a"/>
      <stop offset="1" stop-color="#b0562e"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="0.25" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- macOS-style squircle -->
  <rect x="100" y="100" width="824" height="824" rx="186" fill="url(#bg)"/>
  <rect x="104" y="104" width="816" height="816" rx="182" fill="none" stroke="url(#rim)" stroke-width="8"/>

  <!-- row 1: running -->
  <circle cx="290" cy="340" r="34" fill="#43a047"/>
  <circle cx="290" cy="340" r="52" fill="none" stroke="#43a047" stroke-opacity="0.35" stroke-width="12"/>
  <rect x="376" y="310" width="368" height="60" rx="30" fill="#55535c"/>
  <rect x="376" y="402" width="300" height="22" rx="11" fill="url(#accent)"/>

  <!-- row 2: interrupted -->
  <circle cx="290" cy="524" r="34" fill="#eda545"/>
  <rect x="376" y="494" width="300" height="60" rx="30" fill="#4a4851"/>
  <rect x="376" y="586" width="204" height="22" rx="11" fill="url(#accent)" opacity="0.75"/>

  <!-- row 3: completed -->
  <circle cx="290" cy="708" r="34" fill="#8e8c95"/>
  <rect x="376" y="678" width="228" height="60" rx="30" fill="#413f48"/>
  <rect x="376" y="770" width="120" height="22" rx="11" fill="url(#accent)" opacity="0.5"/>
</svg>
